# =============================================================================
# PERFIL: PRODUÇÃO — PostgreSQL / Supabase
# Ative com: SPRING_PROFILES_ACTIVE=prod
# =============================================================================

# --- PostgreSQL / Supabase ---
# Supabase format: jdbc:postgresql://db.[PROJECT-REF].supabase.co:5432/postgres
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- Desabilitar init SQL (usar apenas JPA DDL em produção) ---
spring.sql.init.mode=never
spring.h2.console.enabled=false

# --- JWT (obrigatório em produção) ---
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# --- Seed de usuários iniciais (configurar via env vars) ---
app.seed.admin1.email=${ADMIN1_EMAIL}
app.seed.admin1.nome=${ADMIN1_NOME:Admin Humaniza}
app.seed.admin1.password=${ADMIN1_PASSWORD}

app.seed.admin2.email=${ADMIN2_EMAIL:}
app.seed.admin2.nome=${ADMIN2_NOME:}
app.seed.admin2.password=${ADMIN2_PASSWORD:}
