spring.application.name=patient-service

# --- H2 (banco padrão para desenvolvimento local sem Docker) ---
spring.h2.console.enabled=false
spring.datasource.url=jdbc:h2:mem:humanizadb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# --- JPA ---
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=create-drop

# --- JWT ---
# Em produção, defina JWT_SECRET com um valor seguro (min. 256 bits em base64)
jwt.secret=${JWT_SECRET:Y2xpbmljYWh1bWFuaXphcmpzZWN1cml0eWtleWJhc2U2NDIwMjU=}
jwt.expiration=86400000

# --- SpringDoc/OpenAPI ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Google Calendar ---
google.calendar.enabled=false
google.calendar.credentials-path=
google.calendar.clinic-calendar-id=

# --- Seed de usuários iniciais ---
# Sobrescreva via variáveis de ambiente em produção
app.seed.admin1.email=${ADMIN1_EMAIL:caissa@humaniza.com}
app.seed.admin1.nome=${ADMIN1_NOME:Caissa Humaniza}
app.seed.admin1.password=${ADMIN1_PASSWORD:Humaniza@2025}

# Usuário 2 (opcional — deixe em branco para não criar)
app.seed.admin2.email=${ADMIN2_EMAIL:}
app.seed.admin2.nome=${ADMIN2_NOME:}
app.seed.admin2.password=${ADMIN2_PASSWORD:}

# Profissional (opcional — para teste de acesso restrito)
app.seed.profissional1.email=${PROF1_EMAIL:}
app.seed.profissional1.nome=${PROF1_NOME:}
app.seed.profissional1.password=${PROF1_PASSWORD:}
