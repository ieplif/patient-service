# ============================================================================
# Produção com SSL (Let's Encrypt)
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================================

services:
  frontend:
    volumes:
      - ./deploy/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
