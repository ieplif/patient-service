services:

  # ─────────────────────────────────────────
  # Banco de dados — PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: humaniza-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: humanizadb
      POSTGRES_USER: ${DB_USERNAME:-humaniza}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-humaniza123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - humaniza-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-humaniza} -d humanizadb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  # Backend — Spring Boot
  # ─────────────────────────────────────────
  backend:
    build: ./backend
    container_name: humaniza-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/humanizadb
      DATABASE_USERNAME: ${DB_USERNAME:-humaniza}
      DATABASE_PASSWORD: ${DB_PASSWORD:-humaniza123}
      JWT_SECRET: ${JWT_SECRET:-Y2xpbmljYWh1bWFuaXphcmpzZWN1cml0eWtleWJhc2U2NDIwMjU=}
      ADMIN1_EMAIL: ${ADMIN1_EMAIL:-caissa@humaniza.com}
      ADMIN1_NOME: ${ADMIN1_NOME:-Caissa Humaniza}
      ADMIN1_PASSWORD: ${ADMIN1_PASSWORD:-Humaniza@2025}
      ADMIN2_EMAIL: ${ADMIN2_EMAIL:-}
      ADMIN2_NOME: ${ADMIN2_NOME:-}
      ADMIN2_PASSWORD: ${ADMIN2_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - humaniza-net

  # ─────────────────────────────────────────
  # Frontend — React + Nginx
  # ─────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: humaniza-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - humaniza-net

networks:
  humaniza-net:
    driver: bridge

volumes:
  postgres_data:
