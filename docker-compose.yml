services:

  # ─────────────────────────────────────────
  # Backend — Spring Boot → Supabase
  # ─────────────────────────────────────────
  backend:
    build: ./backend
    container_name: humaniza-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN1_EMAIL: ${ADMIN1_EMAIL}
      ADMIN1_NOME: ${ADMIN1_NOME}
      ADMIN1_PASSWORD: ${ADMIN1_PASSWORD}
      ADMIN2_EMAIL: ${ADMIN2_EMAIL:-}
      ADMIN2_NOME: ${ADMIN2_NOME:-}
      ADMIN2_PASSWORD: ${ADMIN2_PASSWORD:-}
    networks:
      - humaniza-net

  # ─────────────────────────────────────────
  # Frontend — React + Nginx
  # ─────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: humaniza-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - humaniza-net

networks:
  humaniza-net:
    driver: bridge
