services:

  # ─────────────────────────────────────────
  # Backend — Spring Boot → Supabase
  # ─────────────────────────────────────────
  backend:
    build: ./backend
    container_name: humaniza-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN1_EMAIL: ${ADMIN1_EMAIL}
      ADMIN1_NOME: ${ADMIN1_NOME}
      ADMIN1_PASSWORD: ${ADMIN1_PASSWORD}
      ADMIN2_EMAIL: ${ADMIN2_EMAIL:-}
      ADMIN2_NOME: ${ADMIN2_NOME:-}
      ADMIN2_PASSWORD: ${ADMIN2_PASSWORD:-}
      PROF1_EMAIL: ${PROF1_EMAIL:-}
      PROF1_NOME: ${PROF1_NOME:-}
      PROF1_PASSWORD: ${PROF1_PASSWORD:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-prontuarios}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      # Google Calendar (desligado por padrão). Para ligar: defina no .env e
      # monte o JSON da service account em ./credentials (ver volumes abaixo).
      GOOGLE_CALENDAR_ENABLED: ${GOOGLE_CALENDAR_ENABLED:-false}
      GOOGLE_CALENDAR_CREDENTIALS_PATH: ${GOOGLE_CALENDAR_CREDENTIALS_PATH:-/app/credentials/google-calendar.json}
      GOOGLE_CALENDAR_CLINIC_ID: ${GOOGLE_CALENDAR_CLINIC_ID:-}
      JAVA_OPTS: "-Xms256m -Xmx512m"
    volumes:
      # Credenciais da service account do Google (gitignored; só usado se habilitado)
      - ./credentials:/app/credentials:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - humaniza-net

  # ─────────────────────────────────────────
  # Frontend — React + Nginx
  # ─────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: humaniza-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - humaniza-net

networks:
  humaniza-net:
    driver: bridge
