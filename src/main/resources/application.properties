spring.application.name=patient-service
# --- H2 Console Configuration ---
# Para habilitar o console H2, use o perfil dev: -Dspring.profiles.active=dev
spring.h2.console.enabled=false

# --- JPA/Database Configuration ---

# (Opcional, mas recomendado ) Mostra no log do console o SQL que o Hibernate está gerando.
spring.jpa.show-sql=true

# (Opcional, mas recomendado) Formata o SQL exibido no log para facilitar a leitura.
spring.jpa.properties.hibernate.format_sql=true

# Define a URL de conexão para o banco H2.
# 'mem:testdb' cria um banco em memória chamado 'testdb'.
# DB_CLOSE_DELAY=-1 impede que o banco seja limpo entre as conexões.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1

# Define o driver do banco de dados.
spring.datasource.driverClassName=org.h2.Driver

# Define o usuário do banco (pode ser qualquer coisa, 'sa' é o padrão).
spring.datasource.username=sa

# Define a senha do banco (pode ser deixada em branco).
spring.datasource.password=

# --- Data Initialization ---
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# --- JWT Configuration ---
# Em produção, defina a variável de ambiente JWT_SECRET com um valor seguro.
jwt.secret=${JWT_SECRET:Y2xpbmljYWh1bWFuaXphcmpzZWN1cml0eWtleWJhc2U2NDIwMjU=}
jwt.expiration=86400000

# --- SpringDoc/OpenAPI Configuration ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Google Calendar ---
google.calendar.enabled=false
google.calendar.credentials-path=
google.calendar.clinic-calendar-id=
